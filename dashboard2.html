<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | SkillBloom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:Inter,sans-serif;
  background:#f4f2ff;
  padding:30px;
}
.container{
  max-width:900px;
  margin:auto;
  background:#fff;
  border-radius:18px;
  padding:30px;
  box-shadow:0 15px 40px rgba(0,0,0,.12)
}
.header{
  display:flex;
  gap:20px;
  align-items:center;
}
.header img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}
.header h2{color:#7b3fe4}
.skills span{
  display:inline-block;
  margin:5px;
  padding:6px 12px;
  background:#eee;
  border-radius:20px;
  font-size:14px;
}
.buttons{
  margin-top:20px;
  display:flex;
  gap:10px;
}
button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#7b3fe4;
  color:white;
  cursor:pointer;
}
.logout{background:#e53935}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <img id="img">
    <div>
      <h2 id="name"></h2>
      <p id="role"></p>
      <p id="city"></p>
    </div>
  </div>

  <h3>About</h3>
  <p id="bio"></p>

  <h3>Skills</h3>
  <div class="skills" id="skills"></div>

  <div class="buttons">
    <button onclick="goSearch()">Search</button>
    <button onclick="editProfile()">Edit Profile</button>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
