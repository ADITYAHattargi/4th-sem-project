<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration | SkillBloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="animate-on-scroll">
    <div class="logo">SkillBloom</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="getstart.html" class="active">Get Started</a></li>
      <li><a href="searchtab.html" class="search-link"><i class="fas fa-magnifying-glass"></i> Search</a></li>
    </ul>
    <div class="nav-buttons">
      <button class="login-btn"><a href="login.html">Login</a></button>
      <button class="start-btn"><a href="getstart.html">Home</a></button>
    </div>
  </nav>

  <main style="padding-top: 120px; display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 2rem;">
    <div class="card animate-on-scroll" style="max-width: 500px; width: 100%;">
      <h2><i class="fas fa-graduation-cap"></i> Student Registration</h2>

      <!-- Main Form -->
      <label>Full Name *</label>
      <input type="text" id="name">

      <label>Email *</label>
      <input type="email" id="email">

      <label>College *</label>
      <input type="text" id="college">

      <label>Skills *</label>
      <select id="skills" multiple>
        <option>Content Creation</option>
        <option>Event Management</option>
        <option>Social Media Marketing</option>
        <option>Dancing</option>
        <option>Acting</option>
        <option>Standup Comedy</option>
        <option>Painting</option>
        <option>Arts & Crafts</option>
      </select>

      <label>Profile Photo</label>
      <input type="file" id="photo" accept="image/*">
      <img id="photoPreview" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-top: 1rem; display: none; border: 3px solid #7b3fe4;">

      <label>Short Bio *</label>
      <textarea id="bio" rows="3" placeholder="Tell about yourself..."></textarea>

      <label>City *</label>
      <input type="text" id="city">

      <label>Mobile Number *</label>
      <input type="tel" id="phone" maxlength="10" placeholder="10-digit number">

      <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;">
        <input type="checkbox" id="terms">
        <label for="terms" style="font-weight: 500; font-size: 0.95rem;">Accept Terms</label>
      </div>

      <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
        <input type="checkbox" id="privacy">
        <label for="privacy" style="font-weight: 500; font-size: 0.95rem;">Accept Privacy Policy</label>
      </div>

      <p id="error" style="color: #ff6b6b; margin-top: 1rem;"></p>

      <button onclick="sendOTP()" class="login-submit-btn">Send OTP</button>

      <!-- OTP Section -->
      <div id="otpSection" style="display: none; margin-top: 2rem;">
        <label>Enter OTP</label>
        <input type="text" id="otp">
        <button onclick="verifyOTP()" class="login-submit-btn" style="margin-top: 1rem;">Verify OTP</button>
      </div>

      <!-- Password Section -->
      <div id="passwordSection" style="display: none; margin-top: 2rem;">
        <label>Create Password</label>
        <input type="password" id="password">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword">
        <button onclick="createPassword()" class="login-submit-btn" style="margin-top: 1rem;">Create Account</button>
      </div>
    </div>
  </main>

  <footer>
    © 2026 SkillBloom | Powered by ADI Studio
  </footer>

  <script>
    // Scroll animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    });
    document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));

    function sendOTP() {
      const phone = document.getElementById("phone").value.trim();
      const skills = document.getElementById("skills").value;
      const terms = document.getElementById("terms").checked;
      const privacy = document.getElementById("privacy").checked;
      const error = document.getElementById("error");

      error.innerText = "";

      if (!/^\d{10}$/.test(phone)) {
        error.innerText = "Enter valid 10-digit mobile number";
        return;
      }

      if (skills === "") {
        error.innerText = "Please select a skill";
        return;
      }

      if (!terms || !privacy) {
        error.innerText = "Accept Terms & Privacy Policy";
        return;
      }

      alert("OTP Sent Successfully!");
      document.getElementById("otpSection").style.display = "block";
    }

    function verifyOTP() {
      const otp = document.getElementById("otp").value.trim();
      if (otp.length < 4) {
        alert("Enter valid OTP");
        return;
      }
      document.getElementById("passwordSection").style.display = "block";
    }

      // Photo preview
      document.getElementById('photo').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            document.getElementById('photoPreview').src = e.target.result;
            document.getElementById('photoPreview').style.display = 'block';
          };
          reader.readAsDataURL(file);
        }
      });

      function sendOTP() {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const college = document.getElementById("college").value.trim();
        const skillsSelect = document.getElementById("skills");
        const skills = Array.from(skillsSelect.selectedOptions).map(option => option.value);
        const bio = document.getElementById("bio").value.trim();
        const city = document.getElementById("city").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const terms = document.getElementById("terms").checked;
        const privacy = document.getElementById("privacy").checked;
        const error = document.getElementById("error");

        error.innerText = "";

        if (!name || !email || !college || skills.length === 0 || !bio || !city || !phone) {
          error.innerText = "Fill all required fields";
          return;
        }

        if (!/^\d{10}$/.test(phone)) {
          error.innerText = "Valid 10-digit phone required";
          return;
        }

        if (!terms || !privacy) {
          error.innerText = "Accept terms and privacy";
          return;
        }

        // Simulate OTP on-screen
        window.generatedOTP = Math.floor(1000 + Math.random() * 9000);
        alert(`Your demo OTP is: ${window.generatedOTP}\n(For testing - use this in verify step)`);
        document.getElementById("otpSection").style.display = "block";
      }

      function verifyOTP() {
        const otp = document.getElementById("otp").value.trim();
        if (otp.length !== 4 || parseInt(otp) !== window.generatedOTP) {
          alert("Invalid OTP. Check console.");
          return;
        }
        document.getElementById("passwordSection").style.display = "block";
      }

      async function createPassword() {
        const pass = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;

        if (pass.length < 6) {
          alert("Password at least 6 chars");
          return;
        }
        if (pass !== confirm) {
          alert("Passwords mismatch");
          return;
        }

        const skillsSelect = document.getElementById("skills");
        const skills = Array.from(skillsSelect.selectedOptions).map(option => option.value);
        const photoFile = document.getElementById('photo').files[0];
        let photoUrl = 'https://i.pravatar.cc/150';
        if (photoFile) {
          // Upload to cloudinary
          const formData = new FormData();
          formData.append('photo', photoFile);
          try {
            const uploadRes = await fetch('http://localhost:5000/api/upload', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${localStorage.getItem('tempToken') || ''}` },
              body: formData
            });
            const uploadData = await uploadRes.json();
            photoUrl = uploadData.photoUrl;
          } catch (e) {
            console.log('Upload skipped, using default');
          }
        }

        const regData = {
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          password: pass,
          role: 'student',
          skills,
          city: document.getElementById("city").value,
          photoUrl
        };

        try {
          const response = await fetch('http://localhost:5000/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(regData)
          });
          const data = await response.json();
          if (data.success) {
            localStorage.setItem('token', data.token);
            alert("✅ Registered in MongoDB!");
            window.location.href = "dashboard.html";
          } else {
            alert(data.error);
          }
        } catch (error) {
          alert('Backend error - ensure server running');
        }
      }
    </script>
  </body>
</html>
