<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search | SkillBloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="animate-on-scroll">
    <div class="logo">SkillBloom</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="getstart.html">Get Started</a></li>
      <li><a href="#search" class="active">Search</a></li>
      <li><a href="#explore">Explore</a></li>
    </ul>
    <div class="nav-buttons">
      <button class="login-btn"><a href="login.html">Login</a></button>
      <button class="start-btn"><a href="getstart.html">Get Started</a></button>
    </div>
  </nav>

  <main>
    <!-- Search Box -->
    <section class="animate-on-scroll" style="padding: 6rem 2rem; text-align: center;">
      <div class="card" style="max-width: 900px; margin: auto;">
        <h2>🔍 Find Talent & Opportunities</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 1rem; margin-top: 2rem;">
          <select id="type" style="padding: 1rem;">
            <option value="">Role</option>
            <option value="student">Students</option>
            <option value="business">Businesses</option>
          </select>
          <select id="skill" style="padding: 1rem;">
            <option value="">Skill</option>
            <option>Content Creation</option>
            <option>Social Media</option>
            <option>Event Management</option>
            <option>Dancing</option>
            <option>Acting</option>
            <option>Photography</option>
            <option>Standup</option>
          </select>
          <input type="text" id="location" placeholder="City / Keyword" style="padding: 1rem;">
          <button onclick="performSearch()" class="start-btn" style="padding: 1rem 2rem; font-size: 1rem;">Search</button>
        </div>
      </div>
    </section>

    <!-- Results -->
    <section class="animate-on-scroll">
      <h2 style="text-align: center; margin-bottom: 2rem;">Top Matches</h2>
      <div class="cards" style="max-width: 1200px; margin: auto;">
        <div class="card">
          <img src="https://i.pravatar.cc/150?img=12" alt="Aditya" style="width: 80px; height: 80px; border-radius: 50%; float: left; margin-right: 1rem;">
          <h3>Aditya K</h3>
          <p style="opacity: 0.9; margin-bottom: 0.5rem;">Student • Kalaburagi</p>
          <span class="tag" style="background: rgba(123,63,228,0.2); color: #7b3fe4; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem;">Content Creation</span>
          <div style="clear: both; margin-top: 1rem;">
            <button class="start-btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Connect</button>
          </div>
        </div>
        <div class="card">
          <img src="https://i.pravatar.cc/150?img=33" alt="ADI Studio" style="width: 80px; height: 80px; border-radius: 50%; float: left; margin-right: 1rem;">
          <h3>ADI Studio</h3>
          <p style="opacity: 0.9; margin-bottom: 0.5rem;">Media Agency</p>
          <span class="tag" style="background: rgba(123,63,228,0.2); color: #7b3fe4; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem;">Hiring Creators</span>
          <div style="clear: both; margin-top: 1rem;">
            <button class="start-btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;">View Gigs</button>
          </div>
        </div>
        <!-- More cards... -->
      </div>
    </section>

    <!-- Explore -->
    <section id="explore" class="animate-on-scroll" style="padding: 4rem 2rem;">
      <h2>Explore More</h2>
      <div class="cards" style="max-width: 1200px; margin: auto;">
        <!-- Similar profile cards -->
      </div>
    </section>
  </main>

  <footer>
    © 2026 SkillBloom | Powered by ADI Studio
  </footer>

    <script>
    // Demo profiles data
    const demoProfiles = [
      { name: 'Aditya K', role: 'student', skill: 'Content Creation', city: 'Kalaburagi', photo: 'https://i.pravatar.cc/150?img=12' },
      { name: 'ADI Studio', role: 'business', skill: 'Hiring Creators', city: 'Kalaburagi', photo: 'https://i.pravatar.cc/150?img=33' },
      { name: 'Riya D', role: 'student', skill: 'Dancing', city: 'Bangalore', photo: 'https://i.pravatar.cc/150?img=45' },
      { name: 'Rahul P', role: 'student', skill: 'Photography', city: 'Hyderabad', photo: 'https://i.pravatar.cc/150?img=22' },
      { name: 'EventX Co', role: 'business', skill: 'Event Management', city: 'Mumbai', photo: 'https://i.pravatar.cc/150?img=60' },
      { name: 'Sneha A', role: 'student', skill: 'Acting', city: 'Delhi', photo: 'https://i.pravatar.cc/150?img=17' }
    ];

    let currentProfiles = [...demoProfiles];

    function renderProfiles(profiles = currentProfiles) {
      const container = document.querySelector('.cards');
      container.innerHTML = profiles.map(profile => `
        <div class="card">
          <img src="${profile.photo}" style="width: 80px; height: 80px; border-radius: 50%; float: left; margin-right: 1rem;">
          <h3>${profile.name}</h3>
          <p style="opacity: 0.9; margin-bottom: 0.5rem;">${profile.role.toUpperCase()} • ${profile.city}</p>
          <span style="background: rgba(123,63,228,0.2); color: #7b3fe4; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem;">${profile.skill}</span>
          <div style="clear: both; margin-top: 1rem;">
            <button class="start-btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Connect</button>
          </div>
        </div>
      `).join('');
    }

    function performSearch() {
      const type = document.getElementById('type').value;
      const skill = document.getElementById('skill').value;
      const location = document.getElementById('location').value.toLowerCase();

      currentProfiles = demoProfiles.filter(profile => {
        if (type && profile.role !== type) return false;
        if (skill && !profile.skill.toLowerCase().includes(skill.toLowerCase())) return false;
        if (location && !profile.city.toLowerCase().includes(location)) return false;
        return true;
      });

      renderProfiles();
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', renderProfiles);

    // Scroll animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    });
    document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
  </script>
</body>
</html>
