<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search | SkillBloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Inter, sans-serif;
      background: #f5f3ff;
      padding: 30px;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      max-width: 800px;
      margin: auto;
    }

    select, input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      background: #7b3fe4;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .results {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
    }

    .card h3 {
      margin: 10px 0 5px;
      color: #7b3fe4;
    }

    .role {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="search-bar">
  <select id="roleFilter">
    <option value="">Search For</option>
    <option value="student">Students</option>
    <option value="business">Businesses</option>
  </select>

  <input type="text" id="skillFilter" placeholder="Search by skill (e.g. Editing, Acting)">

  <button onclick="searchProfiles()">Search</button>
</div>

<div class="results" id="results"></div>

<script src="js/search.js"></script>
</body>
</html>
