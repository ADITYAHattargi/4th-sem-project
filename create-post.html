<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post | SkillBloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="animate-on-scroll">
    <div class="logo">SkillBloom</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html" class="active">Dashboard</a></li>
      <li><a href="searchtab.html" class="search-link"><i class="fas fa-magnifying-glass"></i> Search</a></li>
      <li><a href="feed.html">Feed</a></li>
    </ul>
    <div class="nav-buttons">
      <button class="start-btn" onclick="location.href='dashboard.html'">Dashboard</button>
      <button class="login-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <main style="padding-top: 120px; display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 2rem;">
    <div class="card animate-on-scroll" style="max-width: 550px; width: 100%;">
      <h2><i class="fas fa-plus"></i> Create Post</h2>
      <textarea id="caption" rows="5" placeholder="What's on your mind? Hiring, skills showcase, announcement..."></textarea>
      
      <label style="margin-top: 1rem; display: block;">Add Media</label>
      <input type="file" id="media" accept="image/*,video/*">
      
      <div id="preview" style="margin-top: 1.5rem; min-height: 200px; display: flex; align-items: center; justify-content: center; border: 2px dashed rgba(255,255,255,0.3); border-radius: 12px; background: rgba(255,255,255,0.05);">
        <p style="opacity: 0.7;">Preview will appear here</p>
      </div>
      
      <button onclick="createPost()" class="login-submit-btn">Post Now</button>
      <button onclick="location.href='feed.html'" class="login-btn" style="background: rgba(255,255,255,0.1); margin-top: 1rem;">Cancel</button>
    </div>
  </main>

  <footer>
    © 2026 SkillBloom | Powered by ADI Studio
  </footer>

  <script>
    // Media preview
    document.getElementById('media').addEventListener('change', function(e) {
      const file = e.target.files[0];
      const preview = document.getElementById('preview');
      if (file) {
        const url = URL.createObjectURL(file);
        if (file.type.startsWith('image/')) {
          preview.innerHTML = `<img src="${url}" style="width: 100%; border-radius: 12px; max-height: 300px; object-fit: cover;">`;
        } else if (file.type.startsWith('video/')) {
          preview.innerHTML = `<video src="${url}" controls style="width: 100%; border-radius: 12px;"></video>`;
        }
      }
    });

    function createPost() {
      const caption = document.getElementById('caption').value.trim();
      if (!caption) {
        alert('Add a caption!');
        return;
      }
      alert('Post created! (Demo)');
      location.href = 'feed.html';
    }

    function logout() {
      localStorage.clear();
      location.href = 'index.html';
    }

    // Scroll animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => entry.target.classList.add('visible'));
    });
    document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
  </script>
</body>
</html>
