<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Dashboard | SkillBloom</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing:border-box; font-family:Arial, sans-serif; }
body { margin:0; background:#fafafa; }

/* Header */
header {
  background:#7b3fe4;
  color:white;
  padding:12px;
  text-align:center;
}

/* Profile */
.profile {
  background:white;
  padding:15px;
  display:flex;
  gap:15px;
  align-items:center;
  position:relative;
}

.profile img {
  width:90px;
  height:90px;
  border-radius:12px;
  border:3px solid #7b3fe4;
  object-fit:cover;
  cursor:pointer;
}

.profile-info h2 {
  margin:0;
}

.profile-info p {
  margin:4px 0;
  font-size:13px;
}

/* Highlight / Hiring Note */
.highlight {
  position:absolute;
  right:15px;
  top:20px;
  background:#ffeb3b;
  padding:8px 12px;
  border-radius:12px;
  font-size:13px;
  font-weight:bold;
  cursor:pointer;
}

/* Bio */
.bio-box {
  background:white;
  margin:8px;
  padding:15px;
  border-radius:10px;
}

.rating { color:#fbbc04; font-size:14px; }
.category { color:#555; margin-bottom:8px; }

.services span {
  background:#e8f0fe;
  padding:5px 10px;
  border-radius:15px;
  font-size:12px;
  margin-right:6px;
}

.info div {
  display:flex;
  align-items:center;
  margin:8px 0;
  font-size:14px;
}

.info div span { margin-left:8px; }

/* Map */
.map-box {
  margin-top:10px;
  height:220px;
  border-radius:10px;
  overflow:hidden;
}

/* Upload */
.upload-box {
  background:white;
  margin:8px;
  padding:15px;
  border-radius:10px;
}

button {
  background:#7b3fe4;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  margin-top:6px;
}

/* Feed */
.feed {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
  margin:8px;
}

.feed img, .feed video {
  width:100%;
  height:120px;
  object-fit:cover;
}
</style>
</head>

<body>

<header>
  <h2 id="bizName">Business Name</h2>
</header>

<!-- Profile -->
<div class="profile">
  <input type="file" id="logoInput" hidden accept="image/*">
  <img id="bizLogo" onclick="logoInput.click()">

  <div class="profile-info">
    <h2 id="bizTitle"></h2>
    <p><strong>ID:</strong> <span id="bizId"></span></p>
  </div>

  <div class="highlight" onclick="editHighlight()">
    <span id="highlightText">🎥 Hiring Videographer</span>
  </div>
</div>

<!-- Bio -->
<div class="bio-box">
  <div class="rating">⭐ 4.7 (543 reviews)</div>
  <div class="category" id="bizCategory">Restaurant</div>

  <div class="services">
    <span>✔ Dine-in</span>
    <span>✔ Delivery</span>
    <span>✔ Pickup</span>
  </div>

  <div class="info">
    <div>📍 <span id="address"></span></div>
    <div>⏰ <span id="timing"></span></div>
    <div>📞 <span id="phone"></span></div>
  </div>

  <div class="map-box">
    <iframe id="map" width="100%" height="100%" style="border:0"></iframe>
  </div>
</div>

<!-- Upload -->
<div class="upload-box">
  <h3>Add Post / Reel</h3>
  <select id="postType">
    <option value="image">📷 Photo</option>
    <option value="video">🎥 Video</option>
  </select>
  <br><br>
  <input type="file" id="postFile">
  <br>
  <button onclick="uploadPost()">Upload</button>
</div>

<!-- Feed -->
<div class="feed" id="feed"></div>

<script>
/* Load Data */
bizName.innerText = localStorage.businessName || "The N20 Restaurant";
bizTitle.innerText = bizName.innerText;
bizId.innerText = localStorage.businessId || "BUS12345";
bizLogo.src = localStorage.businessLogo || "https://via.placeholder.com/150";
bizCategory.innerText = localStorage.businessCategory || "Restaurant";
address.innerText = localStorage.businessAddress || "Kalaburagi, Karnataka";
phone.innerText = localStorage.businessPhone || "08904839954";
timing.innerText = localStorage.businessTiming || "Open · Closes 11 PM";
highlightText.innerText = localStorage.businessHighlight || "🎥 Hiring Videographer";

map.src = localStorage.businessMap ||
  "https://www.google.com/maps?q=Kalaburagi,Karnataka&output=embed";

/* Logo Upload */
logoInput.onchange = () => {
  const file = logoInput.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  bizLogo.src = url;
  localStorage.businessLogo = url;
};

/* Highlight Edit */
function editHighlight() {
  const text = prompt("Enter important note / hiring info:");
  if (text) {
    highlightText.innerText = text;
    localStorage.businessHighlight = text;
  }
}

/* Posts */
let posts = JSON.parse(localStorage.businessPosts || "[]");

function renderFeed() {
  feed.innerHTML = "";
  posts.forEach(p => {
    if (p.type === "image") {
      let img = document.createElement("img");
      img.src = p.src;
      feed.appendChild(img);
    } else {
      let video = document.createElement("video");
      video.src = p.src;
      video.controls = true;
      feed.appendChild(video);
    }
  });
}

function uploadPost() {
  const file = postFile.files[0];
  if (!file) return alert("Select a file");

  const type = postType.value;
  const src = URL.createObjectURL(file);

  posts.unshift({ src, type });
  localStorage.businessPosts = JSON.stringify(posts);
  renderFeed();
}

renderFeed();
</script>

</body>
</html>
