<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search | SkillBloom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#f4f2ff;
}
header{
  background:#fff;
  padding:15px;
  display:flex;
  gap:10px;
  align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
header input, header select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}
.results{
  max-width:1100px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}
.card{
  background:#fff;
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 20px rgba(0,0,0,.08);
  cursor:pointer;
}
.card img{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
}
.card h3{
  margin:10px 0 5px;
}
.card p{
  color:#666;
  font-size:14px;
}
.skill{
  display:inline-block;
  background:#eee;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  margin:4px 4px 0 0;
}
</style>
</head>

<body>

<header>
  <input id="query" placeholder="Search skills like Editing, Dance...">
  <select id="role">
    <option value="">All</option>
    <option value="student">Students</option>
    <option value="business">Businesses</option>
  </select>
</header>

<div class="results" id="results"></div>

<script src="js/search.js"></script>
</body>
</html>
