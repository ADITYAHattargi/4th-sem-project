<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile | SkillBloom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f4f2ff;
  font-family:Inter,sans-serif;
}
header{
  background:#fff;
  padding:15px;
  text-align:center;
  font-weight:700;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.profile{
  max-width:900px;
  margin:30px auto;
  background:#fff;
  padding:25px;
  border-radius:20px;
}
.top{
  display:flex;
  gap:25px;
  align-items:center;
}
.avatar{
  width:130px;
  height:130px;
  border-radius:50%;
  border:4px solid #7b3fe4;
  object-fit:cover;
}
.info h2{
  margin:0;
}
.role{
  color:#7b3fe4;
  font-weight:600;
}
.bio{
  margin-top:10px;
  color:#555;
}
.skills{
  margin-top:12px;
}
.skill{
  display:inline-block;
  background:#eee;
  padding:6px 12px;
  border-radius:20px;
  margin:5px;
  font-size:14px;
}
.actions{
  margin-top:15px;
}
.actions button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#7b3fe4;
  color:white;
  cursor:pointer;
  margin-right:10px;
}

.posts{
  margin-top:30px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}
.post img, .post video{
  width:100%;
  border-radius:14px;
}
.empty{
  text-align:center;
  color:#777;
  margin-top:30px;
}
</style>
</head>

<body>

<header>SkillBloom Profile</header>

<div class="profile">
  <div class="top">
    <img id="avatar" class="avatar">
    <div class="info">
      <h2 id="name"></h2>
      <div class="role" id="role"></div>
      <div class="bio" id="bio"></div>
      <div class="skills" id="skills"></div>
      <div class="actions">
        <button onclick="startChat()">Message</button>
        <button onclick="goBack()">Back</button>
      </div>
    </div>
  </div>

  <div class="posts">
    <h3>Posts</h3>
    <div class="grid" id="posts"></div>
    <div class="empty" id="noPosts">No posts yet</div>
  </div>
</div>

<script src="js/profile.js"></script>
</body>
</html>
