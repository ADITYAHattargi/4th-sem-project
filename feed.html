<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed | SkillBloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="animate-on-scroll">
    <div class="logo">SkillBloom</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="searchtab.html" class="search-link"><i class="fas fa-magnifying-glass"></i> Search</a></li>
      <li><a href="create-post.html">+ Post</a></li>
    </ul>
    <div class="nav-buttons">
      <button class="login-btn" onclick="location.href='dashboard.html'">Profile</button>
      <button class="start-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <main style="padding-top: 120px; max-width: 650px; margin: auto; padding: 2rem;">
    <div class="animate-on-scroll">
      <h2 style="text-align: center; margin-bottom: 2rem;">📱 Your Feed</h2>
    </div>
    <div class="cards" id="feed" style="gap: 1.5rem;">
      <!-- Dynamic posts from feed.js, styled with .card class -->
      <div class="card">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
          <img src="https://i.pravatar.cc/50" alt="User" style="width: 50px; height: 50px; border-radius: 50%;">
          <div>
            <h3 style="margin: 0;">Aditya K</h3>
            <p style="opacity: 0.8; margin: 0; font-size: 0.9rem;">2h ago</p>
          </div>
        </div>
        <p style="margin-bottom: 1rem; opacity: 0.9;">Looking for content creators for social media! DM if interested. #Hiring #Content</p>
        <img src="https://images.unsplash.com/photo-1516321310764-9f3c22392297?w=600" style="width: 100%; border-radius: 12px;">
        <div style="margin-top: 1rem; display: flex; gap: 1rem; font-size: 1.2rem;">
          <i class="far fa-heart" style="cursor: pointer;"></i>
          <i class="far fa-comment" style="cursor: pointer;"></i>
          <i class="far fa-share-square" style="cursor: pointer;"></i>
        </div>
      </div>
      <!-- More posts... -->
    </div>
  </main>

  <footer>
    © 2026 SkillBloom | Powered by ADI Studio
  </footer>

  <script>
    // Demo feed data - replace with feed.js or backend
    const demoPosts = [
      {
        user: 'ADI Studio',
        time: '1h',
        content: 'Hiring video editors!',
        image: 'https://images.unsplash.com/photo-1547658719-da2b848c1f07?w=600'
      }
      // Add more
    ];

    function loadFeed() {
      const feed = document.getElementById('feed');
      demoPosts.forEach(post => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <img src="https://i.pravatar.cc/50" style="width: 50px; height: 50px; border-radius: 50%;">
            <div>
              <h3>${post.user}</h3>
              <p style="opacity: 0.8; font-size: 0.9rem;">${post.time} ago</p>
            </div>
          </div>
          <p>${post.content}</p>
          ${post.image ? `<img src="${post.image}" style="width: 100%; border-radius: 12px;">` : ''}
          <div style="margin-top: 1rem; display: flex; gap: 1rem; font-size: 1.2rem;">
            <i class="far fa-heart"></i>
            <i class="far fa-comment"></i>
            <i class="far fa-share-square"></i>
          </div>
        `;
        feed.appendChild(card);
      });
    }

    function logout() {
      localStorage.clear();
      location.href = 'index.html';
    }

    document.addEventListener('DOMContentLoaded', loadFeed);

    // Scroll animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => entry.target.classList.add('visible'));
    });
    document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
  </script>
</body>
</html>
