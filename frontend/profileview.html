<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile | SkillBloom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#f4f2ff;
}
.container{
  max-width:900px;
  margin:30px auto;
  background:#fff;
  border-radius:20px;
  padding:30px;
  box-shadow:0 15px 40px rgba(0,0,0,.1);
}
.header{
  display:flex;
  gap:25px;
  align-items:center;
}
.header img{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #7b3fe4;
}
.header h2{
  margin:0;
}
.role{
  color:#7b3fe4;
  font-weight:600;
}
.skills{
  margin-top:10px;
}
.skill{
  display:inline-block;
  background:#eee;
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
  margin:5px;
}
.bio{
  margin:25px 0;
  font-size:15px;
  line-height:1.6;
}
.actions{
  display:flex;
  gap:15px;
}
button{
  padding:10px 20px;
  border-radius:10px;
  border:none;
  font-weight:600;
  cursor:pointer;
}
.primary{
  background:#7b3fe4;
  color:#fff;
}
.secondary{
  background:#eee;
}
.section-title{
  margin-top:40px;
  font-weight:700;
}
.posts{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}
.post{
  height:160px;
  border-radius:14px;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  color:#555;
}
</style>
</head>

<body>

<div class="container" id="profile"></div>

<script>
const users = JSON.parse(localStorage.getItem("skillbloom_users")) || [];
const params = new URLSearchParams(location.search);
const id = params.get("id");

const user = users.find(u => u.id === id);

if(!user){
  document.body.innerHTML="<h2 style='text-align:center'>Profile not found</h2>";
  throw new Error("Profile not found");
}

document.getElementById("profile").innerHTML = `
  <div class="header">
    <img src="${user.image}">
    <div>
      <h2>${user.name}</h2>
      <div class="role">${user.role.toUpperCase()} • ${user.city}</div>
      <div class="skills">
        ${user.skills.map(s=>`<span class="skill">${s}</span>`).join("")}
      </div>
      <div class="actions">
        <button class="primary">DM</button>
        ${user.role==="student" 
          ? "<button class='secondary'>Hire Me</button>" 
          : "<button class='secondary'>View Openings</button>"}
      </div>
    </div>
  </div>

  <div class="bio">${user.bio}</div>

  <div class="section-title">Posts</div>
  <div class="posts">
    <div class="post">Post Coming Soon</div>
    <div class="post">Media Upload</div>
    <div class="post">Reels / Photos</div>
  </div>
`;
</script>

</body>
</html>
