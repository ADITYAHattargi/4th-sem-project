<!DOCTYPE html>
<html>
<head>
<title>Dashboard | SkillBloom</title>
<style>
body {
  font-family: Inter;
  background:#fafafa;
  margin:0;
}

.feed {
  max-width:600px;
  margin:2rem auto;
}

.post {
  background:#fff;
  border-radius:14px;
  margin-bottom:1.5rem;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.post img {
  width:100%;
  border-radius:14px 14px 0 0;
}

.post .content {
  padding:1rem;
}
</style>
</head>

<body>

<div class="feed">

  <div class="post">
    <img src="https://source.unsplash.com/600x400?student">
    <div class="content">
      <strong>@student_name</strong>
      <p>Worked on a design gig today 🎨</p>
    </div>
  </div>

  <div class="post">
    <img src="https://source.unsplash.com/600x400?business">
    <div class="content">
      <strong>@business_owner</strong>
      <p>Hiring campus videographers 🎥</p>
    </div>
  </div>

</div>

</body>
</html>
