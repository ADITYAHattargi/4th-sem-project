<!DOCTYPE html>
<html>
<head>
<title>Business Login | SkillBloom</title>

<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f4f1ff;
  font-family:Arial;
}

.login-box {
  background:white;
  padding:2rem;
  border-radius:12px;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

input, button {
  width:100%;
  padding:0.7rem;
  margin-top:1rem;
}

button {
  background:#7b3fe4;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Business Login</h2>
  <input type="text" id="businessId" placeholder="Enter Business ID">
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const id = document.getElementById("businessId").value.trim();
  const businesses = JSON.parse(localStorage.getItem("skillbloom_businesses") || "[]");
  const business = businesses.find(item => item.businessId === id);

  if (business) {
    localStorage.setItem("skillbloom_current_business", JSON.stringify(business));
    localStorage.businessId = business.businessId;
    localStorage.businessName = business.businessName;
    localStorage.businessCategory = business.category;
    localStorage.businessPhone = business.phone;
    localStorage.businessLogo = business.logo;
    window.location.href = "business-dashboard.html";
  } else if (id === localStorage.businessId) {
    window.location.href = "business-dashboard.html";
  } else {
    alert("Invalid Business ID");
  }
}
</script>

</body>
</html>
