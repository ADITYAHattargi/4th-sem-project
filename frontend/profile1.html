<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile | SkillBloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Inter, sans-serif;
      background: #f5f3ff;
      margin: 0;
      padding: 40px;
    }

    .profile-card {
      max-width: 900px;
      margin: auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 30px;
    }

    .profile-card img {
      width: 100%;
      border-radius: 14px;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      color: #7b3fe4;
    }

    .role {
      font-weight: 600;
      color: #555;
      margin-bottom: 10px;
    }

    .skills span {
      display: inline-block;
      background: #eee;
      padding: 6px 12px;
      border-radius: 20px;
      margin: 5px 5px 0 0;
      font-size: 14px;
    }

    .contact-btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #7b3fe4;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="profile-card">
  <img id="profileImage" src="" alt="Profile Image">

  <div>
    <h1 id="profileName"></h1>
    <div class="role" id="profileRole"></div>
    <p id="profileCity"></p>

    <h3>About</h3>
    <p id="profileBio"></p>

    <h3>Skills</h3>
    <div class="skills" id="profileSkills"></div>

    <button class="contact-btn">Contact</button>
  </div>
</div>

<script src="assets/js/profile1.js"></script>
</body>
</html>
