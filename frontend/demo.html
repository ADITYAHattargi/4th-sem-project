<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile | SkillBloom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f5f3ff;
  font-family:Inter,sans-serif;
}
.header{
  background:#7b3fe4;
  color:#fff;
  padding:25px;
  text-align:center;
}
.header img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #fff;
}
.name{
  font-size:22px;
  font-weight:700;
  margin-top:10px;
}
.role{
  font-size:14px;
  opacity:.9;
}
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}
.section{
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
}
.section h3{
  margin-top:0;
  color:#7b3fe4;
}
.skill{
  display:inline-block;
  background:#eee;
  padding:8px 12px;
  border-radius:20px;
  margin:5px;
  font-size:13px;
}
.button{
  background:#7b3fe4;
  color:#fff;
  padding:12px;
  border:none;
  border-radius:12px;
  width:100%;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <img id="profileImg">
  <div class="name" id="name"></div>
  <div class="role" id="role"></div>
</div>

<div class="container">

  <div class="section">
    <h3>📍 Location</h3>
    <p id="city"></p>
  </div>

  <div class="section">
    <h3>🧠 Skills</h3>
    <div id="skills"></div>
  </div>

  <div class="section">
    <h3>📝 Bio</h3>
    <p id="bio"></p>
  </div>

  <div class="section">
    <button class="button">💬 Contact</button>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const users = JSON.parse(localStorage.getItem("skillbloom_users")) || [];
const user = users.find(u => u.id === id);

if(!user){
  alert("Profile not found");
  location.href="feed.html";
}

profileImg.src = user.image;
name.textContent = user.name;
role.textContent = user.role.toUpperCase();
city.textContent = user.city;
bio.textContent = user.bio;

user.skills.forEach(s=>{
  const span = document.createElement("span");
  span.className="skill";
  span.textContent=s;
  skills.appendChild(span);
});
</script>

</body>
</html>
